# SPI Peripheral Test Configuration

# Enable Rust support
CONFIG_RUST=y
CONFIG_RUST_ALLOC=y

# Enable logging
CONFIG_LOG=y
CONFIG_LOG_BACKEND_RTT=n

# Stack size for Rust
CONFIG_MAIN_STACK_SIZE=8192

# Enable SPI driver
CONFIG_SPI=y

# Enable GPIO (for status indication)
CONFIG_GPIO=y

# Console output
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
