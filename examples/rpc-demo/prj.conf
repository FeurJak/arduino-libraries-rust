# Project Configuration for RPC Demo on Arduino Uno Q

# Enable Rust support
CONFIG_RUST=y
CONFIG_RUST_ALLOC=y

# Enable logging for debug output
CONFIG_LOG=y
CONFIG_LOG_BACKEND_RTT=n

# Increase stack size for Rust (MessagePack handling needs more stack)
CONFIG_MAIN_STACK_SIZE=8192

# Enable debug output via serial console
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# Enable UART interrupt-driven mode for RPC communication
CONFIG_UART_INTERRUPT_DRIVEN=y

# Enable GPIO (may be used for status LEDs)
CONFIG_GPIO=y
