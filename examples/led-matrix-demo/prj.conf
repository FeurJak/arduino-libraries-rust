# Project Configuration for LED Matrix Demo on Arduino Uno Q

# Enable GPIO for LED control
CONFIG_GPIO=y

# Enable Rust support
CONFIG_RUST=y
CONFIG_RUST_ALLOC=y

# Enable logging for debug output
CONFIG_LOG=y
CONFIG_LOG_BACKEND_RTT=n

# Increase stack size for Rust (string formatting needs more stack)
CONFIG_MAIN_STACK_SIZE=8192

# Enable debug output via serial console
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# Enable counter driver for LED matrix timing
CONFIG_COUNTER=y
