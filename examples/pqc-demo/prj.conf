# PQC Demo Configuration for Arduino Uno Q
# Supports both ML-KEM 768 and ML-DSA 65 operations

# Enable Rust support
CONFIG_RUST=y
CONFIG_RUST_ALLOC=y

# Enable logging
CONFIG_LOG=y
CONFIG_LOG_BACKEND_RTT=n

# Stack size for Rust (needs extra for PQC operations)
# ML-KEM 768 + ML-DSA 65 require significant stack space
# ML-DSA 65 needs ~8KB stack for key generation, ~6KB for signing
CONFIG_MAIN_STACK_SIZE=49152

# Heap size for PQC temporary allocations
CONFIG_HEAP_MEM_POOL_SIZE=32768

# Enable SPI driver (for MCU-MPU communication)
CONFIG_SPI=y

# Enable GPIO (for LED matrix)
CONFIG_GPIO=y

# Console output
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# Enable counter driver for LED matrix timing
CONFIG_COUNTER=y

# Enable hardware RNG for key generation
CONFIG_ENTROPY_GENERATOR=y
CONFIG_TEST_RANDOM_GENERATOR=n
