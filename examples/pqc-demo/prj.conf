# PQC Demo Configuration for Arduino Uno Q
# Supports both ML-KEM 768 and ML-DSA 65 operations

# Enable Rust support
CONFIG_RUST=y
CONFIG_RUST_ALLOC=y

# Enable logging
CONFIG_LOG=y
CONFIG_LOG_BACKEND_RTT=n

# Stack size for Rust (needs extra for PQC operations)
# ML-KEM 768 + ML-DSA 65 require significant stack space
# ML-DSA 65 needs ~8KB stack for key generation, ~6KB for signing
CONFIG_MAIN_STACK_SIZE=49152

# Heap size for PQC temporary allocations
CONFIG_HEAP_MEM_POOL_SIZE=32768

# Enable SPI driver (for MCU-MPU communication)
CONFIG_SPI=y

# Enable GPIO (for LED matrix)
CONFIG_GPIO=y

# Console output
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# Enable counter driver for LED matrix timing
CONFIG_COUNTER=y

# Enable hardware RNG for key generation
# Uses STM32U585's True Random Number Generator (TRNG) peripheral
CONFIG_ENTROPY_GENERATOR=y
CONFIG_TEST_RANDOM_GENERATOR=n
# Enable sys_rand_get() API which wraps the entropy driver
CONFIG_ENTROPY_DEVICE_RANDOM_GENERATOR=y

# Enable zcbor for CBOR encoding/decoding (used by arduino-zcbor)
CONFIG_ZCBOR=y

# Enable mbedTLS for XChaCha20-Poly1305 and Ed25519 (SHA512)
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_BUILTIN=y
CONFIG_MBEDTLS_CIPHER_CHACHA20_ENABLED=y
CONFIG_MBEDTLS_POLY1305=y
CONFIG_MBEDTLS_CHACHAPOLY_AEAD_ENABLED=y
# SHA512 is required by Ed25519 implementation
CONFIG_MBEDTLS_HASH_ALL_ENABLED=y
# Heap for mbedTLS (required for ChaCha20-Poly1305 context)
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=8192
