# PQC Demo Configuration for Arduino Uno Q
# Supports both ML-KEM 768 and ML-DSA 65 operations

# Enable Rust support
CONFIG_RUST=y
CONFIG_RUST_ALLOC=y

# Enable logging
CONFIG_LOG=y
CONFIG_LOG_BACKEND_RTT=n

# Stack size for Rust (needs extra for PQC operations)
# ML-KEM 768 + ML-DSA 65 require significant stack space
# ML-DSA 65 needs ~8KB stack for key generation, ~6KB for signing
# SAGA + X-Wing hybrid needs extra stack for large structures:
#   - X-Wing SecretKey: ~3.6KB (ML-KEM private + X25519 + cached public key)
#   - X-Wing PublicKey: ~1.2KB
#   - X-Wing Ciphertext: ~1.1KB
#   - Multiple copies during key exchange: request, device_state, response, keys
# Total estimate for saga_xwing demo: ~20KB+ just for crypto structures
CONFIG_MAIN_STACK_SIZE=98304

# Heap size for PQC temporary allocations
CONFIG_HEAP_MEM_POOL_SIZE=32768

# Enable SPI driver (for MCU-MPU communication)
CONFIG_SPI=y

# Enable GPIO (for LED matrix)
CONFIG_GPIO=y

# Console output
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# Enable counter driver for LED matrix timing
CONFIG_COUNTER=y

# Enable hardware RNG for key generation
# Uses STM32U585's True Random Number Generator (TRNG) peripheral
CONFIG_ENTROPY_GENERATOR=y
CONFIG_TEST_RANDOM_GENERATOR=n
# Enable sys_rand_get() API which wraps the entropy driver
CONFIG_ENTROPY_DEVICE_RANDOM_GENERATOR=y

# Enable zcbor for CBOR encoding/decoding (used by arduino-zcbor)
CONFIG_ZCBOR=y

# Enable mbedTLS for XChaCha20-Poly1305 and Ed25519 (SHA512)
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_BUILTIN=y
CONFIG_MBEDTLS_CIPHER_CHACHA20_ENABLED=y
CONFIG_MBEDTLS_POLY1305=y
CONFIG_MBEDTLS_CHACHAPOLY_AEAD_ENABLED=y
# SHA512 is required by Ed25519 implementation
CONFIG_MBEDTLS_HASH_ALL_ENABLED=y
# Heap for mbedTLS (required for ChaCha20-Poly1305 context)
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=8192

# ============================================================================
# PSA Secure Storage Configuration
# ============================================================================
# Enable PSA Crypto API (required for both ITS and key management)
CONFIG_MBEDTLS_PSA_CRYPTO_C=y

# Enable Zephyr Secure Storage subsystem
CONFIG_SECURE_STORAGE=y

# Use Zephyr's ITS implementation (not TF-M)
CONFIG_SECURE_STORAGE_ITS_IMPLEMENTATION_ZEPHYR=y

# Storage backend: NVS via Settings subsystem
CONFIG_SECURE_STORAGE_ITS_STORE_IMPLEMENTATION_SETTINGS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y

# Enable AEAD transform for encryption at rest
# Uses device-unique key derived from hardware ID
CONFIG_SECURE_STORAGE_ITS_TRANSFORM_IMPLEMENTATION_AEAD=y

# Maximum data size for ITS entries
# X-Wing public key (1216 bytes) is the largest item we need to store
# Using 1280 bytes to provide some headroom
CONFIG_SECURE_STORAGE_ITS_MAX_DATA_SIZE=1280
