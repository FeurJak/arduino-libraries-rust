# RPC Server Configuration for Arduino Uno Q

# Enable Rust support
CONFIG_RUST=y
CONFIG_RUST_ALLOC=y

# Enable logging
CONFIG_LOG=y
CONFIG_LOG_BACKEND_RTT=n

# Stack size for Rust (needs extra for RPC processing)
CONFIG_MAIN_STACK_SIZE=16384

# Enable SPI driver (for MCU-MPU communication)
CONFIG_SPI=y

# Enable GPIO (for LED matrix)
CONFIG_GPIO=y

# Console output
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# Enable counter driver for LED matrix timing
CONFIG_COUNTER=y
